<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C.T.M 核心數值戰術終端</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050608">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiBmaWxsPSIjMDBmMmZlIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMGEwYTBhIi8+PGNpcmNsZSBjeD0iOTYiIGN5PSI5NiIgcj0iNDAiLz48L3N2Zz4=">
    <style>
        :root {
            --matte-black: #050608;
            --panel-bg: #0b0f16;
            --panel-bg-alpha: rgba(11, 15, 22, 0.85);
            --neon-blue: #00f2fe;
            --neon-blue-dark: #007799;
            --neon-glow: 0 0 15px rgba(0, 242, 254, 0.4);
            --border-color: #1e2638;
            --text-primary: #e0e8f0;
            --text-secondary: #627597;
            --danger: #ff0055;
            --danger-glow: 0 0 10px rgba(255, 0, 85, 0.5);
            --success: #39ff14;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--matte-black);
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Desktop default: lock scrolling */
        }

        header {
            background: linear-gradient(180deg, #111624 0%, #080a10 100%);
            border-bottom: 2px solid var(--neon-blue);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--neon-glow);
            z-index: 50;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hud-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        .hud-panel {
            background: var(--panel-bg-alpha);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        
        .hud-panel::before {
            content: ''; position: absolute; top: -1px; left: -1px; width: 15px; height: 15px;
            border-top: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue); pointer-events: none;
        }
        .hud-panel::after {
            content: ''; position: absolute; bottom: -1px; right: -1px; width: 15px; height: 15px;
            border-bottom: 2px solid var(--neon-blue); border-right: 2px solid var(--neon-blue); pointer-events: none;
        }

        .panel-header {
            background: rgba(255, 255, 255, 0.02);
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-left {
            width: 340px;
            flex-shrink: 0;
        }

        .char-manager {
            padding: 18px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
        }

        .char-selector-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .char-profile-card {
            background: rgba(0, 242, 254, 0.04);
            border: 1px dashed var(--neon-blue-dark);
            padding: 15px;
            border-radius: 6px;
        }

        .stats-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-ribbon {
            background: #0d121c;
            border: 1px solid #1a2538;
            padding: 12px 16px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            transition: all 0.2s;
            border-left: 3px solid var(--neon-blue-dark);
        }
        .stat-ribbon:hover {
            border-color: var(--neon-blue);
            background: #111825;
            border-left-width: 5px;
        }
        .stat-ribbon .val {
            color: var(--neon-blue);
            font-weight: 700;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.6);
        }

        .panel-center {
            flex: 1.5;
        }

        .matrix-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tabs-container {
            display: flex;
            gap: 8px;
            max-width: 100%;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .tab-trigger {
            background: #0f1522;
            border: 1px solid #202d42;
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .tab-trigger:hover {
            border-color: var(--neon-blue-dark);
        }
        .tab-trigger.active {
            background: var(--border-color);
            border-color: var(--neon-blue);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .matrix-nine-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 650px;
        }

        .matrix-node {
            background: #090c12;
            border: 1px solid #161f30;
            border-radius: 10px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .matrix-node:hover {
            border-color: var(--neon-blue);
            box-shadow: var(--neon-glow);
            background: #0f1624;
            transform: translateY(-2px);
        }
        .matrix-node.selected {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 254, 0.08);
            box-shadow: var(--neon-glow), inset 0 0 12px rgba(0, 242, 254, 0.2);
            transform: scale(1.02);
        }
        .matrix-node.filled {
            border-color: var(--neon-blue-dark);
            background: rgba(0, 119, 153, 0.15);
        }

        .node-index {
            font-size: 0.8rem;
            color: var(--text-secondary);
            position: absolute;
            top: 10px; left: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .node-name {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin-top: 10px;
            text-align: center;
            word-break: break-all;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .node-star {
            font-size: 0.85rem;
            color: var(--neon-blue);
            margin-top: 6px;
        }

        .panel-right {
            width: 380px;
            flex-shrink: 0;
        }

        .editor-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
            flex: 1;
        }

        .editor-placeholder {
            color: var(--text-secondary);
            text-align: center;
            margin: auto 0;
            font-size: 0.95rem;
            font-style: italic;
            line-height: 1.6;
        }

        .input-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: bold;
            display: block;
            letter-spacing: 1px;
        }

        .ctrl-input {
            background: #080b12;
            color: #fff;
            border: 1px solid #202b40;
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            transition: all 0.2s;
        }
        .ctrl-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
            background: #0b0f1a;
        }

        .select-star {
            appearance: none;
            background: #080b12 url("data:image/svg+xml;utf8,<svg fill='%2300f2fe' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right 10px center;
            padding-right: 32px;
        }

        .affix-matrix-box {
            border-top: 1px solid var(--border-color);
            padding-top: 18px;
            margin-top: 5px;
        }

        .affix-slot-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .btn-terminal {
            background: transparent;
            border: 1px solid var(--neon-blue-dark);
            color: var(--neon-blue);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-terminal:hover {
            background: rgba(0, 242, 254, 0.15);
            box-shadow: var(--neon-glow);
            border-color: var(--neon-blue);
        }
        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn-danger:hover {
            background: rgba(255, 0, 85, 0.15);
            box-shadow: var(--danger-glow);
            border-color: #ff3377;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1f2c3f; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-blue-dark); }

        /* ========================================================= */
        /* 手機版排版與滾動終極修復 (MOBILE SCROLL FIX V2)               */
        /* ========================================================= */
        @media (max-width: 1199px) {
            html, body {
                height: auto !important;
                min-height: 100% !important;
                overflow-y: auto !important;
                overflow-x: hidden !important;
                display: block !important; /* 移除 flex 避免高度計算異常 */
                -webkit-overflow-scrolling: touch;
            }
            .hud-layout {
                display: block !important; /* 改用標準區塊排列 */
                height: auto !important;
                overflow: visible !important;
                padding: 10px;
            }
            .hud-panel {
                width: 100% !important;
                display: block !important;
                height: auto !important;
                margin-bottom: 20px;
            }
            .stats-scroller, .matrix-scroller, .editor-container {
                display: block !important;
                height: auto !important;
                max-height: none !important;
                overflow: visible !important;
                padding-bottom: 20px;
            }
            .matrix-nine-grid {
                display: grid !important;
                max-width: 100%;
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<datalist id="global-cards"></datalist>
<datalist id="global-affixes"></datalist>

<header>
    <div class="brand-zone">
        <h1>數值統整終端</h1>
    </div>
</header>

<div class="hud-layout">
    <aside class="hud-panel panel-left">
        <div class="panel-header">英雄檔案庫</div>
        
        <div class="char-manager">
            <div class="char-selector-row">
                <select id="charDropdown" class="ctrl-input" onchange="switchCharacter(this.value)"></select>
                <button class="btn-terminal" onclick="createNewCharacter()">＋ 新建</button>
            </div>
            
            <div class="char-profile-card">
                <div style="margin-bottom: 12px;">
                    <label class="input-title">編譯名稱</label>
                    <input type="text" id="charNameInput" class="ctrl-input" placeholder="輸入角色名稱" oninput="updateCharProfile('name', this.value)">
                </div>
                <div>
                    <label class="input-title">設定職業</label>
                    <input type="text" id="charJobInput" class="ctrl-input" placeholder="輸入職業 (例如: 刺客/法師)" oninput="updateCharProfile('job', this.value)">
                </div>
            </div>
        </div>

        <div class="panel-header" style="border-top: 1px solid var(--border-color);">全能力補正面板</div>
        <div class="stats-scroller" id="statsSummaryOutput"></div>
    </aside>

    <section class="hud-panel panel-center">
        <div class="panel-header">
            <span>裝備插槽矩陣</span>
            <button class="btn-terminal btn-danger" style="padding: 6px 12px; font-size:0.8rem;" onclick="purgeCurrentCharConfig()">重置裝備</button>
        </div>
        
        <div class="matrix-scroller">
            <div class="tabs-container" id="equipTabsHeaders"></div>
            <div class="matrix-nine-grid" id="matrixNineGridContainer"></div>
        </div>
    </section>

    <aside class="hud-panel panel-right">
        <div class="panel-header" id="editorPanelTitle">改裝系統</div>
        <div class="editor-container" id="editorPanelContent" style="scroll-margin-top: 20px;">
            <div class="editor-placeholder">請選取中央的矩陣方格<br>解鎖 1-5 欄詞墜加成配置</div>
        </div>
    </aside>
</div>

    let globalAppState = JSON.parse(localStorage.getItem('moonSoul_MultiCharApp_v4')) || {
        activeCharId: 'char_1',
        characters: {
            'char_1': { name: '預設英雄', job: '初心者', config: {} }
        }
    };

    let activeEquipName = structuralEquips[0] ? structuralEquips[0].name : '';
    let activeSlotIndex = null;

    function buildDatalists() {
        document.getElementById('global-cards').innerHTML = allCards.map(c => `<option value="${c}">`).join('');
        document.getElementById('global-affixes').innerHTML = allAffixes.map(a => `<option value="${a}">`).join('');
    }

    function verifyAndFixStructure() {
        const charId = globalAppState.activeCharId;
        if (!globalAppState.characters[charId]) {
            globalAppState.activeCharId = Object.keys(globalAppState.characters)[0] || 'char_1';
        }
        const curChar = globalAppState.characters[globalAppState.activeCharId];
        if (!curChar.config) curChar.config = {};

        structuralEquips.forEach(eq => {
            if (!curChar.config[eq.name]) {
                curChar.config[eq.name] = [];
            }
            eq.slots.forEach((slot, sIdx) => {
                if (!curChar.config[eq.name][sIdx]) {
                    curChar.config[eq.name][sIdx] = {
                        slotLabel: slot,
                        card: '',
                        star: '',
                        affixes: [{name:'',val:''},{name:'',val:''},{name:'',val:''},{name:'',val:''},{name:'',val:''}]
                    };
                }
            });
        });
    }

    function renderCharDropdown() {
        const dropdown = document.getElementById('charDropdown');
        dropdown.innerHTML = '';
        Object.keys(globalAppState.characters).forEach(id => {
            const char = globalAppState.characters[id];
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = `${char.name} [${char.job}]`;
            if (id === globalAppState.activeCharId) opt.selected = true;
            dropdown.appendChild(opt);
        });

        const curChar = globalAppState.characters[globalAppState.activeCharId];
        document.getElementById('charNameInput').value = curChar.name || '';
        document.getElementById('charJobInput').value = curChar.job || '';
    }

    window.createNewCharacter = function() {
        const newId = 'char_' + Date.now();
        globalAppState.characters[newId] = {
            name: '新英雄',
            job: '未知職業',
            config: {}
        };
        globalAppState.activeCharId = newId;
        activeSlotIndex = null;
        verifyAndFixStructure();
        saveAndRefreshAll();
    }

    window.switchCharacter = function(id) {
        globalAppState.activeCharId = id;
        activeSlotIndex = null;
        verifyAndFixStructure();
        saveAndRefreshAll();
    }

    window.updateCharProfile = function(key, val) {
        globalAppState.characters[globalAppState.activeCharId][key] = val;
        localStorage.setItem('moonSoul_MultiCharApp_v4', JSON.stringify(globalAppState));
        const dropdown = document.getElementById('charDropdown');
        const opt = dropdown.querySelector(`option[value="${globalAppState.activeCharId}"]`);
        if (opt) {
            const char = globalAppState.characters[globalAppState.activeCharId];
            opt.textContent = `${char.name} [${char.job}]`;
        }
    }

    function renderTabs() {
        const container = document.getElementById('equipTabsHeaders');
        container.innerHTML = structuralEquips.map(eq => `
            <button class="tab-trigger ${eq.name === activeEquipName ? 'active' : ''}" onclick="switchEquipTab('${eq.name}')">
                ${eq.name}
            </button>
        `).join('');
    }

    window.switchEquipTab = function(name) {
        activeEquipName = name;
        activeSlotIndex = null;
        renderTabs();
        renderMatrix();
        renderEditor();
    }

    function renderMatrix() {
        const container = document.getElementById('matrixNineGridContainer');
        container.innerHTML = '';

        const curChar = globalAppState.characters[globalAppState.activeCharId];
        const slots = curChar.config[activeEquipName] || [];

        slots.forEach((slotData, idx) => {
            const node = document.createElement('div');
            const isFilled = slotData.card || slotData.affixes.some(a => a.name && a.val);
            const isSelected = (idx === activeSlotIndex);

            node.className = `matrix-node ${isFilled ? 'filled' : ''} ${isSelected ? 'selected' : ''}`;
            node.onclick = () => selectMatrixNode(idx);

            let inner = `<div class="node-index">${slotData.slotLabel}</div>`;
            if (slotData.card) {
                inner += `
                    <div class="node-name">${slotData.card}</div>
                    <div class="node-star">${slotData.star ? slotData.star + ' ★' : ''}</div>
                `;
            } else {
                const activeCount = slotData.affixes.filter(a => a.name && a.val).length;
                if (activeCount > 0) {
                    inner += `<div class="node-name" style="color:var(--neon-blue); font-size:0.9rem;">系統注能 (${activeCount})</div>`;
                } else {
                    inner += `<div style="color:#2a364f; font-size:0.85rem; font-weight:bold; letter-spacing:1px;">EMPTY</div>`;
                }
            }

            node.innerHTML = inner;
            container.appendChild(node);
        });
    }

    function selectMatrixNode(idx) {
        activeSlotIndex = idx;
        renderMatrix();
        renderEditor();
        
        // Mobile auto-scroll logic
        if (window.innerWidth <= 1199) {
            setTimeout(() => {
                document.getElementById('editorPanelContent').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    }

    function renderEditor() {
        const titleEl = document.getElementById('editorPanelTitle');
        const container = document.getElementById('editorPanelContent');

        if (activeSlotIndex === null) {
            titleEl.textContent = "改裝系統";
            container.innerHTML = `<div class="editor-placeholder">請選取中央的矩陣方格<br>解鎖 1-5 欄詞墜加成配置</div>`;
            return;
        }

        const curChar = globalAppState.characters[globalAppState.activeCharId];
        const slotData = curChar.config[activeEquipName][activeSlotIndex];
        titleEl.textContent = `${activeEquipName} - ${slotData.slotLabel}`;

        let starOpts = '<option value="">選擇星級</option>';
        for (let i = 1; i <= 40; i++) {
            starOpts += `<option value="${i}" ${slotData.star == i ? 'selected' : ''}>${i} 星</option>`;
        }

        let affixRows = '';
        for (let i = 0; i < 5; i++) {
            const af = slotData.affixes[i] || {name:'', val:''};
            affixRows += `
                <div class="affix-slot-row">
                    <input type="text" list="global-affixes" class="ctrl-input" placeholder="欄位 ${i+1} 詞墜屬性" value="${af.name || ''}" oninput="updateAffixData(${i}, 'name', this.value)">
                    <input type="number" class="ctrl-input" placeholder="數值" min="1" max="20000" value="${af.val || ''}" oninput="updateAffixData(${i}, 'val', this.value)">
                </div>
            `;
        }

        container.innerHTML = `
            <div>
                <label class="input-title">卡片鑑定核心</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" list="global-cards" class="ctrl-input" placeholder="鍵入卡片名稱..." value="${slotData.card || ''}" oninput="updateHeaderData('card', this.value)">
                    <select class="ctrl-input select-star" style="flex:0.6; min-width:100px;" onchange="updateHeaderData('star', this.value)">
                        ${starOpts}
                    </select>
                </div>
            </div>

            <div class="affix-matrix-box">
                <label class="input-title" style="margin-bottom:12px;">核心屬性注能 (1-5欄 / 範圍1-20000)</label>
                ${affixRows}
            </div>

            <button class="btn-terminal btn-danger" style="margin-top:auto;" onclick="purgeNodeData()">閹割/清空此孔洞</button>
        `;
    }

    window.updateHeaderData = function(key, val) {
        const curChar = globalAppState.characters[globalAppState.activeCharId];
        curChar.config[activeEquipName][activeSlotIndex][key] = val;
        syncAndCalculate();
        renderMatrix();
    }

    window.updateAffixData = function(afIdx, key, val) {
        const curChar = globalAppState.characters[globalAppState.activeCharId];
        curChar.config[activeEquipName][activeSlotIndex].affixes[afIdx][key] = val;
        syncAndCalculate();
    }

    window.purgeNodeData = function() {
        const curChar = globalAppState.characters[globalAppState.activeCharId];
        curChar.config[activeEquipName][activeSlotIndex] = {
            slotLabel: curChar.config[activeEquipName][activeSlotIndex].slotLabel,
            card: '',
            star: '',
            affixes: [{name:'',val:''},{name:'',val:''},{name:'',val:''},{name:'',val:''},{name:'',val:''}]
        };
        syncAndCalculate();
        renderMatrix();
        renderEditor();
    }

    window.purgeCurrentCharConfig = function() {
        if(confirm('警告：即將抹除當前英雄的所有裝備數據！')) {
            const curChar = globalAppState.characters[globalAppState.activeCharId];
            curChar.config = {};
            verifyAndFixStructure();
            activeSlotIndex = null;
            syncAndCalculate();
            renderMatrix();
            renderEditor();
        }
    }

    function syncAndCalculate() {
        localStorage.setItem('moonSoul_MultiCharApp_v4', JSON.stringify(globalAppState));
        calculateAggregations();
    }

    function calculateAggregations() {
        const aggregates = {};
        const curChar = globalAppState.characters[globalAppState.activeCharId];
        
        if (curChar && curChar.config) {
            Object.keys(curChar.config).forEach(eqName => {
                curChar.config[eqName].forEach(slot => {
                    if (slot.affixes) {
                        slot.affixes.forEach(af => {
                            if (af.name && af.val && !isNaN(af.val)) {
                                const k = af.name.trim();
                                aggregates[k] = (aggregates[k] || 0) + Number(af.val);
                            }
                        });
                    }
                });
            });
        }

        const container = document.getElementById('statsSummaryOutput');
        const sorted = Object.keys(aggregates).sort();

        if (sorted.length === 0) {
            container.innerHTML = `<div style="color:var(--text-secondary); text-align:center; font-size:0.95rem; font-style:italic; padding-top:30px;">核心未偵測到加成屬性</div>`;
            return;
        }

        container.innerHTML = sorted.map(k => `
            <div class="stat-ribbon">
                <span>${k}</span>
                <span class="val">+${aggregates[k]}</span>
            </div>
        `).join('');
    }

    function saveAndRefreshAll() {
        localStorage.setItem('moonSoul_MultiCharApp_v4', JSON.stringify(globalAppState));
        renderCharDropdown();
        renderTabs();
        renderMatrix();
        renderEditor();
        calculateAggregations();
    }

    buildDatalists();
    verifyAndFixStructure();
    saveAndRefreshAll();
</script>
